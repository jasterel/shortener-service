[coverage:run]
source = app
branch = True
omit =
    # Celery worker entry-point — not invoked during unit/functional tests
    app/tasks/cleanup_tasks.py
    app/core/celery_app.py

[coverage:report]
show_missing = True
skip_covered = False
exclude_lines =
    # Standard pragmas
    pragma: no cover
    # Abstract methods / type stubs
    raise NotImplementedError
    # Defensive type-checking branches
    if TYPE_CHECKING:
    if __name__ == .__main__.:
