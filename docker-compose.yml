version: "3.9"

services:

  db:
    image: postgres:15
    container_name: shortener_postgres
    restart: always
    environment:
      POSTGRES_DB: shortener
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: shortener_redis
    restart: always
    ports:
      - "6379:6379"

  celery_worker:
    build: .
    container_name: shortener_worker
    command: celery -A app.core.celery_app.celery_app worker --loglevel=info
    depends_on:
      - redis
      - db
    env_file:
      - .env

  celery_beat:
    build: .
    container_name: shortener_scheduler
    command: celery -A app.core.celery_app.celery_app beat --loglevel=info
    depends_on:
      - redis
      - db
    env_file:
      - .env

  api:
    build: .
    container_name: shortener_api
    restart: always
    depends_on:
      - db
      - redis
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - .:/app

volumes:
  postgres_data: